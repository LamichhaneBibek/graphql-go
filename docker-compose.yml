services:
  app:
    build: .
    container_name: go_graphql_api

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: graphql_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: